volumes:
  pg_data:
  static:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always
  backend:
    build: ./backend/
    env_file: .env
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 backend.wsgi:application"
    volumes:
      - static:/app/collected_static
    depends_on:
      - db
    restart: always
  frontend:
    env_file: .env
    build: ./frontend/
    command: cp -r /app/build/. /frontend_static
    volumes:
      - static:/frontend_static
  gateway:
    build: ./gateway/
    volumes:
      - static:/staticfiles
    ports:
      - 8000:80
    depends_on:
      - backend
      - frontend
    restart: always
