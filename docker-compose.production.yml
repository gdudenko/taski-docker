volumes:
  pg_data_production:
  static_volume:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data
    restart: always

  backend:
    image: gdudenko/taski_backend # Скачивается из Docker Hub
    env_file: .env
    volumes:
      - static_volume:/backend_static
    depends_on:
      - db
    restart: always

  frontend:
    image: gdudenko/taski_frontend # Скачивается из Docker Hub
    env_file: .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static_volume:/frontend_static

  gateway:
    image: gdudenko/taski_gateway # Скачивается из Docker Hub
    env_file: .env
    volumes:
      - static_volume:/staticfiles/
    ports:
      - 8000:80
    depends_on:
      - backend
      - frontend
    restart: always
